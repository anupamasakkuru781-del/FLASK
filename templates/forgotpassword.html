<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f2f2f2;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .forgot-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
            text-align:center;
        }

        .forgot-card h2{
            font-weight:bold;
            margin-bottom:20px;
        }

        .forgot-card p{
            color:gray;
            margin-bottom:25px;
        }

        .btn-reset{
            width:100%;
        }

        .back-link{
            text-decoration:none;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="forgot-card">

    <h2>Forgot Password</h2>

    <p>
        Enter your username or email and we'll send
        you a link to reset your password.
    </p>

    <form action="/send_reset_link" method="POST">
        

        <input type="text"
               name="email"
               class="form-control mb-3"
               placeholder="Enter your username or email"
               required>

        <button type="submit"
                class="btn btn-primary btn-reset">
            Send Reset Link
        </button>

    </form>

    <br>

    <a href="/login" class="back-link">
        Back to Login
    </a>

</div>

</body>
</html>
