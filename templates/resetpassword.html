<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f2f2f2;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .reset-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }
    </style>
</head>
<body>

<div class="reset-card">

    <h2>Reset Password</h2>

    <form method="POST">

        <input
            type="password"
            name="password"
            class="form-control mb-3"
            placeholder="Enter New Password"
            required>

        <button
            type="submit"
            class="btn btn-success w-100">
            Update Password
        </button>

    </form>

</div>

</body>
</html>
